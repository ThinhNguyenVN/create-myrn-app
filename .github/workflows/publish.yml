name: Publish Package

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: Select the npm version bump to apply before publishing.
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build

      - name: Run typecheck
        run: npm run typecheck

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump package version
        run: |
          npm version "${{ inputs.version_bump }}" --no-git-tag-version

      - name: Capture release version and tag
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "PACKAGE_VERSION=${PACKAGE_VERSION}" >> "$GITHUB_ENV"
          echo "PACKAGE_TAG=v${PACKAGE_VERSION}" >> "$GITHUB_ENV"

      - name: Prevent publishing an existing version
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PUBLISHED_VERSION=$(npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version 2>/dev/null || true)
          if [ "${PUBLISHED_VERSION}" = "${PACKAGE_VERSION}" ]; then
            echo "Version ${PACKAGE_VERSION} is already published for ${PACKAGE_NAME}."
            exit 1
          fi

      - name: Publish package to npm
        run: npm publish --access public --provenance

      - name: Commit release version and create tag
        run: |
          git add package.json package-lock.json
          git commit -m "chore: release ${PACKAGE_VERSION}"
          git tag "${PACKAGE_TAG}"

      - name: Push version commit and tag
        run: |
          git push origin HEAD:main
          git push origin "${PACKAGE_TAG}"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${PACKAGE_TAG}" \
            --title "${PACKAGE_TAG}" \
            --generate-notes \
            --verify-tag

      - name: Write release link to job summary
        run: |
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${PACKAGE_TAG}"
          {
            echo "## Publish complete"
            echo
            echo "- Version: ${PACKAGE_VERSION}"
            echo "- Tag: ${PACKAGE_TAG}"
            echo "- Release: ${RELEASE_URL}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Roll back local release changes on failure
        if: failure()
        run: |
          git reset --hard HEAD
          git tag -d "${PACKAGE_TAG}" 2>/dev/null || true
